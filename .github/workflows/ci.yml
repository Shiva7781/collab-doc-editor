name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  MONGODB_URI: "mongodb://localhost:27017/HOE_test"
  NEXTAUTH_SECRET: "ci-test-secret-32-characters-long"
  NEXTAUTH_URL: "http://localhost:3000"
  JWT_SECRET: "ci-jwt-secret"
  NEXT_PUBLIC_WS_URL: "ws://localhost:3001"
  GROQ_API_KEY: "gsk_dummy_for_ci"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint
        run: npm run lint --if-present

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy (customize for your platform)
        run: |
          echo "Deploy step — integrate with Vercel, Railway, or your VPS here"
          echo "Example: vercel --prod --token=$VERCEL_TOKEN"
